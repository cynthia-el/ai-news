name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      LONGCAT_API_KEY: ${{ secrets.LONGCAT_API_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://localhost' }}
      NEXT_PUBLIC_SITE_NAME: ${{ vars.NEXT_PUBLIC_SITE_NAME || '家居建材AI资讯' }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build for Cloudflare
        run: npx opennextjs-cloudflare build
        timeout-minutes: 15
        env:
          NODE_ENV: production

      - name: Add cron support to worker
        run: |
          cat > .open-next/worker-cron.js << 'EOF'
          import worker from './worker.js';

          export default {
            async fetch(request, env, ctx) {
              return worker.fetch(request, env, ctx);
            },
            async scheduled(event, env, ctx) {
              const request = new Request('http://internal/api/admin/sync', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${env.CRON_SECRET || ''}`,
                },
              });
              try {
                const response = await worker.fetch(request, env, ctx);
                console.log(`[Cron] Sync status: ${response.status}`);
                const body = await response.text();
                console.log(`[Cron] Response: ${body.slice(0, 500)}`);
              } catch (error) {
                console.error(`[Cron] Sync failed:`, error);
              }
            },
          };
          EOF

      - name: Check bundle size
        run: |
          echo "=== Build output ==="
          ls -lh .open-next/server-functions/default/handler.mjs 2>/dev/null || true
          ls -lh .open-next/assets/ 2>/dev/null || true
          echo "=== Total .open-next size ==="
          du -sh .open-next/ || true

      - name: Deploy secrets to Cloudflare
        run: |
          printf "%s" "$DATABASE_URL" | npx wrangler secret put DATABASE_URL --yes
          printf "%s" "$CRON_SECRET" | npx wrangler secret put CRON_SECRET --yes
          printf "%s" "$LONGCAT_API_KEY" | npx wrangler secret put LONGCAT_API_KEY --yes
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          LONGCAT_API_KEY: ${{ secrets.LONGCAT_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --config wrangler.cron.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Print wrangler logs on failure
        if: failure()
        run: |
          echo "=== Wrangler logs ==="
          cat /home/runner/.config/.wrangler/logs/*.log 2>/dev/null || true
