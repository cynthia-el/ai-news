name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      LONGCAT_API_KEY: ${{ secrets.LONGCAT_API_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://localhost' }}
      NEXT_PUBLIC_SITE_NAME: ${{ vars.NEXT_PUBLIC_SITE_NAME || '家居建材AI资讯' }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build for Cloudflare
        run: npx opennextjs-cloudflare build
        timeout-minutes: 15
        env:
          NODE_ENV: production

      - name: Verify build output
        run: |
          echo "=== .open-next contents ==="
          ls -la .open-next/ || true
          echo "=== .open-next/assets contents ==="
          ls -la .open-next/assets/ || true
          echo "=== worker.js exists? ==="
          test -f .open-next/worker.js && echo "YES" || echo "NO"

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --verbose
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
